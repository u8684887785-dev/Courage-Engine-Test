<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scene Editor v7.1</title>
    <link rel="stylesheet" href="styles.css">
    <script src="indexedDB.js"></script>
</head>
<body>
    <div class="editor">
        <h1>Scene Editor v7.1</h1>
        <div id="home-screen">
            <h2>Projektide Ajalugu</h2>
            <ul id="project-history"></ul>
        </div>
        <label for="project-name">Nimega: <span id="timestamp"></span></label>
        <input type="text" id="project-name" placeholder="Nimi tulemus.." />
        <button onclick="saveProject()">Salvesta Projekt</button>
        <button onclick="loadProject()">Laadi Projekt</button>
        <div class="canvas-container">
            <canvas id="sceneCanvas"></canvas>
        </div>
    </div>
    <script>
        // Auto-save every 3 seconds
        setInterval(saveProject, 3000);
        
        // Project naming with timestamps
        function updateTimestamp() {
            const now = new Date();
            const timestamp = now.toISOString().replace(/T/, '-').replace(/:/g, '-').split('.')[0];
            document.getElementById('timestamp').innerText = timestamp;
        }
        
        function saveProject() {
            const projectName = document.getElementById('project-name').value || `scene-${document.getElementById('timestamp').innerText}`;
            // Save project logic here
            console.log(`Saving project: ${projectName}`);
        }  
        
        function loadProject() {
            // Load project logic here
            console.log(`Loading project...`);
        }
        
        // Call updateTimestamp initially
        updateTimestamp();
    </script>
</body>
</html>
